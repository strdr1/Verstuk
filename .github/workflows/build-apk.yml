name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Gradle 9.4.1 на ubuntu-latest несовместим с Cordova (Groovy 4 убрал XmlParser).
      # Ставим 7.6.4 первым в PATH — он перекрывает системный.
      - name: Override system Gradle with 7.6.4
        run: |
          curl -fSL "https://services.gradle.org/distributions/gradle-7.6.4-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-33" "build-tools;33.0.2"

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Create Cordova project
        run: |
          cordova create android-app com.verstuk.app Verstuk
          cd android-app
          cordova platform add android@12

      - name: Copy web files
        run: |
          cp index.html android-app/www/index.html
          [ -f sw.js ] && cp sw.js android-app/www/sw.js || true

      - name: Configure app name and icon
        run: |
          # Конвертируем иконку в PNG 512x512
          convert "Screenshot_11 (1).jpg" -resize 512x512 android-app/www/icon.png
          # Меняем имя и добавляем иконку в config.xml
          python3 - <<'EOF'
          with open('android-app/config.xml', 'r', encoding='utf-8') as f:
              c = f.read()
          c = c.replace('<name>Verstuk</name>', '<name>Мой.Учет.Мебель</name>')
          c = c.replace('</widget>', '    <icon src="www/icon.png" />\n</widget>')
          with open('android-app/config.xml', 'w', encoding='utf-8') as f:
              f.write(c)
          EOF

      - name: Build APK
        run: |
          cd android-app
          cordova build android --debug

      - uses: actions/upload-artifact@v4
        with:
          name: verstuk-debug
          path: android-app/platforms/android/app/build/outputs/apk/debug/*.apk
